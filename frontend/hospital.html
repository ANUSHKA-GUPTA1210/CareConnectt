<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hospitals | HealthConnect</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; }
    header { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; background:#4facfe; color:white; }
    nav a { color:white; margin-left:15px; text-decoration:none; }
    .container { display:flex; justify-content:space-around; padding:20px; gap:20px; flex-wrap:wrap; }
    .card { border:1px solid #ddd; padding:20px; border-radius:8px; width:350px; background:#f9f9f9; }
    h2 { margin-top:0; }
    .form-group { margin-bottom:12px; }
    input, textarea { width:100%; padding:8px; margin-top:4px; border-radius:4px; border:1px solid #ccc; }
    button { padding:10px 15px; border:none; border-radius:5px; background:#4facfe; color:white; cursor:pointer; }
    button:hover { background:#00f2fe; }
    #message { margin-top:10px; font-weight:bold; }
  </style>
</head>
<body>

<header>
  <div class="logo"><i class="fa-solid fa-hospital"></i> HealthConnect</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="donor.html">Donate</a>
    <a href="search.html">Search</a>
    <a href="hospital.html">Hospitals</a>
  </nav>
</header>

<section class="container">

  <!-- Register Hospital -->
  <div class="card">
    <h2>Register Hospital</h2>
    <form id="registerForm">
      <div class="form-group">
        <label>Hospital Name</label>
        <input type="text" id="hospitalName" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="hospitalEmail" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="hospitalPassword" required>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="tel" id="hospitalContact" required>
      </div>
      <div class="form-group">
        <label>Address</label>
        <textarea id="hospitalAddress" required></textarea>
      </div>
      <div class="form-group">
        <label>Total Beds</label>
        <input type="number" id="hospitalBeds" required>
      </div>
      <div class="form-group">
        <label>Speciality / Services</label>
        <input type="text" id="hospitalSpeciality">
      </div>
      <button type="submit">Register</button>
      <div id="registerMsg"></div>
    </form>
  </div>

  <!-- Login Hospital -->
  <div class="card">
    <h2>Hospital Login</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required>
      </div>
      <button type="submit">Login</button>
      <div id="loginMsg"></div>
    </form>

    <!-- Update Info (shown after login) -->
    <div id="updateSection" style="display:none; margin-top:20px;">
      <h3>Update Hospital Info</h3>
      <form id="updateForm">
        <div class="form-group">
          <label>Total Beds</label>
          <input type="number" id="updateBeds">
        </div>
        <div class="form-group">
          <label>Available Blood Groups</label>
          <input type="text" id="updateBloodGroups" placeholder="A+, B+, O-, ...">
        </div>
        <button type="submit">Update Info</button>
        <div id="updateMsg"></div>
      </form>
    </div>
  </div>

</section>

<script>
  let hospitalId = null; // to store logged-in hospital id
  let token = null; // store JWT token

  // Register
  document.getElementById('registerForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const data = {
      name: document.getElementById('hospitalName').value,
      email: document.getElementById('hospitalEmail').value,
      password: document.getElementById('hospitalPassword').value,
      contact: document.getElementById('hospitalContact').value,
      address: document.getElementById('hospitalAddress').value,
      beds: document.getElementById('hospitalBeds').value,
      speciality: document.getElementById('hospitalSpeciality').value
    };
    try {
      const res = await fetch('http://localhost:5000/api/auth/register', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      const msgDiv = document.getElementById('registerMsg');
      if(res.ok){
        msgDiv.style.color='green';
        msgDiv.textContent="Registered Successfully!";
        document.getElementById('registerForm').reset();
      } else {
        msgDiv.style.color='red';
        msgDiv.textContent=result.msg || "Error!";
      }
    } catch(err){
      console.error(err);
    }
  });

  // Login
  document.getElementById('loginForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const data = {
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value
    };
    try {
      const res = await fetch('http://localhost:5000/api/auth/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      const msgDiv = document.getElementById('loginMsg');
      if(res.ok){
        msgDiv.style.color='green';
        msgDiv.textContent="Logged in successfully!";
        hospitalId = result.hospital._id; // save id
        token = result.token; // save JWT
        document.getElementById('updateSection').style.display='block';
        document.getElementById('updateBeds').value = result.hospital.beds || '';
      } else {
        msgDiv.style.color='red';
        msgDiv.textContent=result.msg || "Login failed!";
      }
    } catch(err){
      console.error(err);
    }
  });

  // Update hospital info
  document.getElementById('updateForm').addEventListener('submit', async (e)=>{
    e.preventDefault();
    if(!hospitalId) return;
    const data = {
      beds: document.getElementById('updateBeds').value,
      bloodGroups: document.getElementById('updateBloodGroups').value
    };
    try {
      const res = await fetch(`http://localhost:5000/api/hospitals/${hospitalId}`, {
        method:'PUT',
        headers:{
          'Content-Type':'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      const msgDiv = document.getElementById('updateMsg');
      if(res.ok){
        msgDiv.style.color='green';
        msgDiv.textContent="Updated successfully!";
      } else {
        msgDiv.style.color='red';
        msgDiv.textContent=result.msg || "Update failed!";
      }
    } catch(err){
      console.error(err);
    }
  });
</script>

</body>
</html>
