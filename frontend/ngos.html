<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NGO Auth | CareConnect</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
body{margin:0;font-family:Segoe UI;background:linear-gradient(to right,#43e97b,#38f9d7);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{background:white;padding:40px;border-radius:20px;width:95%;max-width:650px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
h2{text-align:center;color:#20b486}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tabs button{flex:1;padding:12px;border:none;border-radius:10px;background:#eee;font-weight:600;cursor:pointer}
.tabs button.active{background:#20b486;color:#fff}
.form{display:none;flex-direction:column;gap:15px}
.form.active{display:flex}
input,textarea{padding:12px;border-radius:10px;border:1px solid #ccc}
.btn{background:#20b486;color:#fff;border:none;padding:14px;border-radius:12px;font-weight:bold;cursor:pointer}
.otp{display:flex;gap:10px}
</style>
</head>
<body>
<div class="container">
<h2>CareConnect NGO Portal</h2>
<div class="tabs">
<button id="loginTab" class="active">NGO Login</button>
<button id="registerTab">NGO Register</button>
</div>

<!-- LOGIN -->
<form id="loginForm" class="form active">
<input type="text" placeholder="NGO Authentication ID" required>
<input type="email" id="loginEmail" placeholder="Registered Email" required>
<div class="otp">
<input type="text" placeholder="Enter OTP" required>
<button type="button" onclick="sendOtp('login')">Send OTP</button>
</div>
<button class="btn">Login</button>
</form>

<!-- REGISTER -->
<form id="registerForm" class="form">
<input type="text" placeholder="NGO Name" required>
<input type="email" id="regEmail" placeholder="Email" required>
<div class="otp">
<input type="text" placeholder="Enter OTP" required>
<button type="button" onclick="sendOtp('register')">Send OTP</button>
</div>
<input type="tel" placeholder="Contact Number" required>
<textarea placeholder="Address" required></textarea>
<input type="text" placeholder="Type of Services" required>
<input type="file">
<button class="btn">Register NGO</button>
</form>
</div>

<script>
const loginTab=document.getElementById('loginTab');
const registerTab=document.getElementById('registerTab');
const loginForm=document.getElementById('loginForm');
const registerForm=document.getElementById('registerForm');
loginTab.onclick=()=>{loginTab.classList.add('active');registerTab.classList.remove('active');loginForm.classList.add('active');registerForm.classList.remove('active');}
registerTab.onclick=()=>{registerTab.classList.add('active');loginTab.classList.remove('active');registerForm.classList.add('active');loginForm.classList.remove('active');}
function sendOtp(type){alert('OTP sent to '+(type==='login'?document.getElementById('loginEmail').value:document.getElementById('regEmail').value));}
</script>
</body>
</html>
